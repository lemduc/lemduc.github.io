<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}{{ site.keywords }}{% endif %}">
    <meta name="author" content="{{ site.author.name }}">

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} - RSS Feed" href="{{ site.url }}{{ site.baseurl }}/feed.xml">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/images/lemduc.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ site.url }}{{ site.baseurl }}">
    <meta property="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="twitter:image" content="{{ site.url }}{{ site.baseurl }}/images/lemduc.png">
    <meta property="twitter:site" content="@{{ site.author.twitter }}">

    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">

    <link rel="stylesheet" href="/stylesheets/bootstrap.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/stylesheets/bootstrap-social.css">
    <link rel="stylesheet" href="/stylesheets/nak.css">
    <link rel="stylesheet" href="/stylesheets/dark-mode.css">
    <link rel="stylesheet" href="/stylesheets/custom-improvements.css">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Duc Minh Le",
        "honorificSuffix": "PhD",
        "url": "{{ site.url }}{{ site.baseurl }}",
        "image": "{{ site.url }}{{ site.baseurl }}/images/lemduc.png",
        "email": "{{ site.author.email }}",
        "jobTitle": "Senior Software Engineer",
        "worksFor": {
            "@type": "Organization",
            "name": "Bloomberg LP",
            "url": "https://www.bloomberg.com"
        },
        "alumniOf": [
            {
                "@type": "CollegeOrUniversity",
                "name": "University of Southern California",
                "url": "https://www.usc.edu/"
            }
        ],
        "sameAs": [
            "https://github.com/lemduc",
            "https://linkedin.com/in/lemduc",
            "https://scholar.google.com/citations?user=NckEwNMAAAAJ",
            "https://dblp.uni-trier.de/pers/hd/l/Le:Duc_Minh",
            "https://twitter.com/lemduc"
        ],
        "knowsAbout": ["Software Architecture", "System Security", "Software Engineering", "Cloud Infrastructure"]
    }
    </script>
</head>
