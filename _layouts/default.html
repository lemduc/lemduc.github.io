<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
    <a href="#content" class="sr-only sr-only-focusable">Skip to main content</a>
    <i id="top"></i>
    {% include nav.html %}
    {% include header.html %}
    <div class="container">
        {{ content }}
    </div>
    {% include footer.html %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        function toggleBibTeX(btn) {
            var colPub = btn.closest(".col-pub");
            var bibtex = colPub.querySelector('.pub-bibtex');
            bibtex.classList.toggle("hidden");
            btn.classList.toggle("btn-default");
            btn.classList.toggle("btn-primary");
        }
        function stripeRows() {
            var rows = document.querySelectorAll(".row");
            var pubIndex = 0;
            rows.forEach(function(row) {
                if (row.querySelector(".col-pub")) {
                    if (pubIndex % 2 === 0) {
                        row.classList.add("even");
                    } else {
                        row.classList.add("odd");
                    }
                    pubIndex++;
                }
            });
        }
        function adjustCols() {
            document.querySelectorAll(".row").forEach(function(row) {
                row.querySelectorAll(".col-pub-header").forEach(function(el) {
                    el.classList.add('col-10', 'offset-0');
                });
                row.querySelectorAll(".col-pub").forEach(function(el) {
                    el.classList.add('col-10', 'offset-0');
                });
            });
        }
        function insertButtons() {
            document.querySelectorAll('.pub-html').forEach(function(el) {
                if (el.closest('.col-pub').querySelector('.pub-bibtex')) {
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'btn btn-default btn-sm';
                    btn.textContent = 'BibTeX';
                    btn.onclick = function() { toggleBibTeX(this); return false; };
                    el.after(btn);
                }
            });
        }
        function setupPubs() {
            stripeRows();
            adjustCols();
            insertButtons();
        }
        document.addEventListener('DOMContentLoaded', function() {
            setupPubs();
        });
    </script>
    <script data-goatcounter="https://lemduc.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
