<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
    <a href="#content" class="sr-only sr-only-focusable">Skip to main content</a>
    <i id="top"></i>
    {% include nav.html %}
    {% include header.html %}
    <div class="container" id="content">
        {{ content }}
    </div>
    {% include footer.html %}
    <script>
        function toggleBibTeX(btn) {
            var colPub = btn.closest(".col-pub");
            colPub.querySelector('.pub-bibtex').classList.toggle("hidden");
            btn.classList.toggle("btn-default");
            btn.classList.toggle("btn-primary");
        }
        function stripeRows() {
            document.querySelectorAll(".row").forEach(function(el, index) {
                if (el.querySelector(".col-pub")) {
                    el.classList.add(index % 2 === 0 ? "even" : "odd");
                }
            });
        }
        function adjustCols() {
            document.querySelectorAll(".row").forEach(function(el) {
                el.querySelectorAll(".col-pub-header, .col-pub").forEach(function(col) {
                    col.classList.add('col-xs-10', 'col-xs-offset-0');
                });
            });
        }
        function insertButtons() {
            document.querySelectorAll('.pub-html').forEach(function(el) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn btn-default btn-sm';
                btn.textContent = 'BibTeX';
                btn.onclick = function() { toggleBibTeX(this); return false; };
                el.after(btn);
            });
        }
        document.addEventListener('DOMContentLoaded', function() {
            stripeRows();
            adjustCols();
            insertButtons();
        });
    </script>
    <script data-goatcounter="https://lemduc.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
